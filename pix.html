<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copiar PIX</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    width:350px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

button{
    width:100%;
    background:#28a745;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#msg{
    margin-top:20px;
    color:#28a745;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>Pagamento via PIX</h2>

<p>Clique abaixo para copiar o código PIX.</p>

<button onclick="copiarPix()">
📋 Copiar Código PIX
</button>

<div id="msg"></div>

</div>

<script>

function getParametro(nome){
    const params = new URLSearchParams(window.location.search);
    return params.get(nome);
}

function copiarPix(){

    let codigo = getParametro("pix");

    if(!codigo){
        document.getElementById("msg").innerHTML="Código PIX não informado.";
        return;
    }

    navigator.clipboard.writeText(codigo)
    .then(function(){
        document.getElementById("msg").innerHTML="✅ Código PIX copiado!";
    })
    .catch(function(){
        document.getElementById("msg").innerHTML="Erro ao copiar.";
    });

}

</script>

</body>
</html>
